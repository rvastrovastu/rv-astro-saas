version: "3.9"

services:
  backend:
    build: ./backend
    container_name: rvyas-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/rvyas-astro
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: rvyas-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: